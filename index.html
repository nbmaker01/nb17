<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>WebXR A-Frame GLB Example</title>
  <!-- A-Frame 라이브러리 불러오기 -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>
  <!-- A-Frame 씬 시작 (VR 지원 활성화) -->
  <a-scene vr-mode-ui="enabled: true">

    <!-- ====== 자산(Assets) 미리 로드 ====== -->
    <a-assets>
      <!-- GLB 모델 로드 -->
      <a-asset-item id="model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- ====== 하늘 (배경) ====== -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- ====== 바닥 ====== -->
    <a-plane 
      rotation="-90 0 0" 
      width="2000" 
      height="2000" 
      color="#7BC8A4">
    </a-plane>

    <!-- ====== 조명 설정 ====== -->
    <a-entity light="type: ambient; intensity: 1.2"></a-entity>
    <a-entity 
      light="type: directional; intensity: 2.5" 
      position="50 100 80">
    </a-entity>

    <!-- ====== 카메라 + 이동 컨트롤 ====== -->
    <a-entity 
      id="player"
      position="0 200 1500"  <!-- 엄청 커진 모델에 맞춰 매우 멀리 배치 -->
      movement-controls="speed: 5"
      wasd-controls
      look-controls>
      
      <a-camera></a-camera>

      <!-- VR 컨트롤러 -->
      <a-entity laser-controls="hand: left"></a-entity>
      <a-entity laser-controls="hand: right"></a-entity>
    </a-entity>

    <!-- ====== 3D 모델 (집 + 나무 100배 추가 확대) ====== -->
    <a-entity 
      gltf-model="#model"
      position="0 0 -300"
      scale="10000 10000 10000"   <!-- 🔥 기존보다 100배 더 크게 -->
      rotation="0 30 0">
    </a-entity>

  </a-scene>
</body>
</html>
